<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Profile Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f7f6; }
        .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card p-4">
                    <h3 class="text-center mb-4">👤 Personal Profile (iCEPS)</h3>
                    <form action="ProfileServlet" method="POST">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Name</label>
                            <input type="text" class="form-control" name="name" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Student ID</label>
                                <input type="text" class="form-control" name="studentId" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-bold">Program Code</label>
                                <input type="text" class="form-control" name="program" placeholder="e.g., CS240" required>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Email</label>
                            <input type="email" class="form-control" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Hobbies</label>
                            <input type="text" class="form-control" name="hobbies" placeholder="e.g., Reading, Coding" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold">Short Self-Introduction</label>
                            <textarea class="form-control" name="introduction" rows="3" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold">Submit Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
