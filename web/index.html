<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Personal Profile Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h3 class="text-center mb-4">Personal Profile (CSP5)</h3>
                <form action="ProfileServlet" method="POST">
                    <div class="mb-3">
                        <label class="form-label">Name</label>
                        <input type="text" class="form-control" name="name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Student ID</label>
                        <input type="text" class="form-control" name="studentId" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Program Code</label>
                        <input type="text" class="form-control" name="program" placeholder="e.g., CS/MP">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Hobbies</label>
                        <input type="text" class="form-control" name="hobbies" placeholder="e.g., Reading, Coding">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Short Self-Introduction</label>
                        <textarea class="form-control" name="introduction" rows="3"></textarea>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">SUBMIT PROFILE</button>
                </form>
            </div>
        </div>
    </div>
</div>
</body>
</html>
